apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-resource-driver
  labels:
    denniseffing.de/source: "public"
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: intel-gpu-resource-driver
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/infrastructure/kube-system/intel-gpu-resource-driver/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
