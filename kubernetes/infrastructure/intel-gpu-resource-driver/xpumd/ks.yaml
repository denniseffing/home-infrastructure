apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: xpumd
  labels:
    denniseffing.de/source: "public"
  namespace: flux-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: xpumd
      namespace: intel-gpu-resource-driver
  interval: 1h
  path: ./kubernetes/infrastructure/intel-gpu-resource-driver/xpumd/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: intel-gpu-resource-driver
