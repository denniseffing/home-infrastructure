apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-private
  namespace: flux-system
  labels:
    denniseffing.de/source: "private"
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: home-infrastructure-private
  path: kubernetes/apps
  prune: true
