apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
configMapGenerator:
  - files:
      - automations.yaml
      - climates.yaml
      - groups.yaml
      - notify.yaml
      - switches.yaml
    name: home-assistant-gitops-config
    options:
      disableNameSuffixHash: true
